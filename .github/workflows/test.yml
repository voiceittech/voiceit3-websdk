name: Build
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT }}
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache-dependency-path: voiceit3-go-server-example/go.sum
      - name: Configure private repo access
        run: git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"
      - name: Build frontend
        run: |
          cd voiceit3-frontend
          npm install
          npm run build
      - name: Build Go server
        env:
          GOPRIVATE: github.com/voiceittech/*
          GONOSUMCHECK: github.com/voiceittech/*
        run: |
          cd voiceit3-go-server-example
          go build ./...
      - name: Check Node server syntax
        run: |
          cd voiceit3-node-server-example
          npm install
          node --check server.js
