name: Build
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: voiceit3-go-server-example/go.sum
      - name: Build frontend
        run: |
          cd voiceit3-frontend
          npm install
          npm run build
      - name: Build Go server
        run: |
          cd voiceit3-go-server-example
          go build ./...
      - name: Check Node server syntax
        run: |
          cd voiceit3-node-server-example
          npm install
          node --check server.js
